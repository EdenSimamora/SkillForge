{% extends "base.html" %}
{% load i18n %}

{% block content %}

<h3>
    {% trans "Are you sure you want to delete" %} "{{ skill.name }}"?
</h3>

<form method="post" class="mt-3">

    {% csrf_token %}

    <button class="btn btn-danger">
        {% trans "Delete" %}
    </button>

    <a href="/" class="btn btn-secondary">
        {% trans "Cancel" %}
    </a>

</form>

{% endblock %}
